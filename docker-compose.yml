version: "3.9"

services:
  backend:
    build:
      context: ./deepfake-backend
    container_name: reality-check-backend
    ports:
      - "8000:8000"
    volumes:
      - ./deepfake-backend/checkpoints:/app/checkpoints
    environment:
      - DEVICE=cpu
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./reality-check-ai
    container_name: reality-check-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
